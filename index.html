<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Plinky HTG</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#0c1630; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
        .game { width:390px; height:844px; background:linear-gradient(#0b1f44,#1b0d35); position:relative; border-radius:30px; border:4px solid #222; }
        .top-title { text-align:center; color:white; font-size:40px; font-weight:bold; padding-top:20px; font-family:cursive; }
        canvas { position:absolute; top:100px; left:0; }
        .bottom { position:absolute; bottom:0; left:0; width:100%; background:rgba(56,0,93,.9); padding:20px; border-radius:0 0 25px 25px; }
        .win-box { background:gold; color:#111; font-size:24px; font-weight:bold; text-align:center; padding:10px; border-radius:6px; margin-bottom:15px; }
        .play-btn { width:100px; height:100px; border-radius:50%; background:white; border:8px solid gold; display:flex; justify-content:center; align-items:center; margin:10px auto; font-size:24px; font-weight:bold; color:#b07b00; cursor:pointer; }
        .controls { display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:10px; }
        input { width:100px; padding:10px; font-size:18px; text-align:center; border-radius:5px; border:none; }
        button#retireBtn { padding:10px 20px; background:#ff4757; color:white; border:none; border-radius:5px; font-size:18px; cursor:pointer; font-weight:bold; }
        .ball { position:absolute; width:14px; height:14px; border-radius:50%; background:#ff2ea6; box-shadow:0 0 15px #ff2ea6; z-index:10; }
    </style>
</head>
<body>

<div class="game">
    <div class="top-title">Plinky HTG</div>
    <canvas id="board" width="390" height="500"></canvas>
    
    <div class="bottom">
        <div class="win-box" id="winText">Balans: 100.00 HTG</div>
        
        <div class="controls">
            <input type="number" id="betAmount" value="1.00" step="1">
            <div class="play-btn" id="playBtn">PLAY</div>
            <button id="retireBtn">RETIRE</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    let balance = 100.00;
    
    // Desen poto yo
    const pegs = [];
    for(let r=0; r<10; r++){
        for(let c=0; c<=r; c++){
            pegs.push({x: canvas.width/2 - (r*16) + (c*32), y: 70 + r*48});
        }
    }
    pegs.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
        ctx.fillStyle="white"; ctx.fill();
    });

    const winText = document.getElementById("winText");
    const betInput = document.getElementById("betAmount");

    document.getElementById("playBtn").addEventListener("click", () => {
        let bet = parseFloat(betInput.value);
        if(balance < bet) { alert("Pa ase lajan!"); return; }
        
        balance -= bet;
        updateUI("Jwe...");
        createBall(bet);
    });

    document.getElementById("retireBtn").addEventListener("click", () => {
        alert("Ou retire: " + balance.toFixed(2) + " HTG");
        balance = 0;
        updateUI("Balans: 0.00 HTG");
    });

    function updateUI(text) { winText.innerText = text; }

    function createBall(bet) {
        const ball = document.createElement("div");
        ball.className = "ball";
        let x = 195, y = 80;
        ball.style.left = x + "px"; ball.style.top = y + "px";
        document.querySelector(".game").appendChild(ball);

        let move = setInterval(() => {
            y += 4; x += (Math.random() - 0.5) * 10;
            ball.style.top = y + "px"; ball.style.left = x + "px";
            if(y > 480) {
                clearInterval(move);
                ball.remove();
                // Lojik genyen: ble (5.0x) la difisil anpil (5%)
                const outcomes = [0.2, 0.5, 1.0, 0.5, 0.2, 0.2, 0.5, 0.2, 5.0];
                let multiplier = outcomes[Math.floor(Math.random() * outcomes.length)];
                let won = bet * multiplier;
                balance += won;
                winText.innerText = "Ou genyen: " + won.toFixed(2) + " HTG";
            }
        }, 30);
    }
</script>

</body>
</html>
