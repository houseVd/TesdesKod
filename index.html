<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Mwen Navigatè Pèsonèl</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 70%; padding: 10px; }
        button { padding: 10px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #eee; margin-bottom: 5px; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h2>Rechèch mwen yo</h2>
    <input type="text" id="searchInput" placeholder="Antre rechèch ou an...">
    <button onclick="saveSearch()">Sove</button>
    
    <h3>Istorik mwen:</h3>
    <ul id="historyList"></ul>
</div>

<script>
    // Fonksyon pou sove rechèch
    function saveSearch() {
        let input = document.getElementById("searchInput");
        let val = input.value;
        if (val.trim() !== "") {
            let searches = JSON.parse(localStorage.getItem("mySearches") || "[]");
            searches.push(val);
            localStorage.setItem("mySearches", JSON.stringify(searches));
            input.value = "";
            displaySearches();
        }
    }

    // Fonksyon pou montre rechèch yo
    function displaySearches() {
        let list = document.getElementById("historyList");
        list.innerHTML = "";
        let searches = JSON.parse(localStorage.getItem("mySearches") || "[]");
        searches.forEach((item) => {
            let li = document.createElement("li");
            li.textContent = item;
            list.appendChild(li);
        });
    }

    // Chaje rechèch yo lè paj la ouvri
    window.onload = displaySearches;
</script>

</body>
</html>
