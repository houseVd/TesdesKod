<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plinky HTG Pro</title>
    <style>
        body { margin: 0; background: #0c1630; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .game { width: 390px; height: 844px; background: linear-gradient(#0b1f44, #1b0d35); position: relative; border-radius: 40px; border: 4px solid #222; overflow: hidden; }
        
        /* Triyang Pwen yo */
        canvas { display: block; margin: 120px auto 0; }
        
        /* Bwat anba yo */
        .bottom-ui { position: absolute; bottom: 0; width: 100%; background: #2d1b4e; padding: 20px; border-radius: 30px 30px 0 0; }
        .grid-multipliers { display: flex; justify-content: center; gap: 4px; margin-bottom: 20px; }
        .cell { padding: 8px 5px; font-size: 11px; font-weight: bold; border-radius: 4px; color: #000; width: 48px; text-align: center; }
        .yellow { background: #e6d500; } .green { background: #27d047; } .blue { background: #00bfff; }
        
        /* Balans ak Retire */
        .stats-bar { display: flex; background: #e6d500; border-radius: 12px; margin-bottom: 20px; align-items: center; padding: 5px; }
        #balanceDisplay { flex-grow: 1; font-size: 24px; font-weight: bold; padding: 10px; }
        #retireBtn { background: #ff4757; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* Bouton Play */
        .play-btn { width: 130px; height: 130px; background: white; border: 8px solid #e6d500; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto; font-size: 30px; font-weight: bold; color: #b07b00; cursor: pointer; box-shadow: 0 0 20px #e6d500; }
        
        .ball { position: absolute; width: 14px; height: 14px; background: #ff2ea6; border-radius: 50%; z-index: 10; }
        
        /* Dyalòg Personnalisé */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; text-align: center; color: #000; }
    </style>
</head>
<body>

<div class="game">
    <canvas id="board" width="350" height="350"></canvas>
    
    <div class="bottom-ui">
        <div class="grid-multipliers">
            <div class="cell yellow">0.00</div>
            <div class="cell green">0.25</div>
            <div class="cell green">0.50</div>
            <div class="cell blue">25.00</div>
            <div class="cell green">0.50</div>
            <div class="cell green">0.25</div>
            <div class="cell yellow">0.00</div>
        </div>
        
        <div class="stats-bar">
            <div id="balanceDisplay">0.00 HTG</div>
            <button id="retireBtn">RETIRE</button>
        </div>
        
        <div class="play-btn" id="playBtn">PLAY</div>
    </div>
</div>

<div class="modal" id="myModal">
    <div class="modal-content">
        <p id="modalText"></p>
        <button onclick="document.getElementById('myModal').style.display='none'">OK</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    let balance = 0.00;

    // Trase Pwen yo (Pegs) - pi sere
    for(let i=0; i<10; i++) {
        for(let j=0; j<=i; j++) {
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(175 - (i*14) + (j*28), 20 + (i*30), 4, 0, Math.PI*2);
            ctx.fill();
        }
    }

    function showModal(msg) {
        document.getElementById("modalText").innerText = msg;
        document.getElementById("myModal").style.display = "flex";
    }

    document.getElementById("playBtn").addEventListener("click", () => {
        // Peye 1 goud
        balance -= 1;
        updateUI();

        const ball = document.createElement("div");
        ball.className = "ball";
        ball.style.left = "175px"; ball.style.top = "20px";
        document.querySelector(".game").appendChild(ball);

        let x = 175, y = 20;
        let move = setInterval(() => {
            y += 4;
            x += (Math.random() - 0.5) * 6;
            ball.style.top = y + "px";
            ball.style.left = x + "px";

            if(y > 330) {
                clearInterval(move);
                ball.remove();
                
                // Lojik rezilta yo
                let outcomes = [0, 0.25, 0.50, 25.00, 0.50, 0.25, 0];
                let won = outcomes[Math.floor(Math.random() * outcomes.length)];
                balance += won;
                updateUI();
                showModal("Ou jwenn: " + won.toFixed(2) + " HTG!");
            }
        }, 20);
    });

    document.getElementById("retireBtn").addEventListener("click", () => {
        showModal("Ou retire total: " + balance.toFixed(2) + " HTG!");
        balance = 0;
        updateUI();
    });

    function updateUI() {
        document.getElementById("balanceDisplay").innerText = balance.toFixed(2) + " HTG";
    }
</script>

</body>
</html>
