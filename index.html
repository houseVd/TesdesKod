<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plinky HTG Pro</title>
    <style>
        body { margin: 0; background: #0c1630; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .game { width: 100vw; max-width: 400px; height: 100vh; background: linear-gradient(#0b1f44, #1b0d35); position: relative; overflow: hidden; }
        
        /* Piramid la desann pi ba (tèt li kòmanse a 150px) */
        canvas { display: block; margin: 150px auto 0; background: transparent; }
        
        .bottom-ui { position: absolute; bottom: 0; width: 100%; background: #2d1b4e; padding: 20px; box-sizing: border-box; }
        .grid-multipliers { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 20px; }
        .cell { padding: 8px 2px; font-size: 10px; font-weight: bold; border-radius: 4px; color: #000; text-align: center; }
        
        #retireBtn { width: 100%; background: #ff4757; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; margin-bottom: 15px; cursor: pointer; }
        .play-btn { width: 100%; padding: 20px; background: white; border: 4px solid #e6d500; border-radius: 10px; text-align: center; font-size: 20px; font-weight: bold; color: #b07b00; cursor: pointer; }
        
        .ball { position: absolute; width: 14px; height: 14px; background: #ff2ea6; border-radius: 50%; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

<div class="game" id="gameArea">
    <canvas id="board" width="350" height="200"></canvas>
    
    <div class="bottom-ui">
        <div class="grid-multipliers">
            <div class="cell" style="background:#e6d500">0.00</div>
            <div class="cell" style="background:#27d047">0.25</div>
            <div class="cell" style="background:#27d047">0.50</div>
            <div class="cell" style="background:#00bfff">25.00</div>
            <div class="cell" style="background:#27d047">0.50</div>
            <div class="cell" style="background:#27d047">0.25</div>
            <div class="cell" style="background:#e6d500">0.00</div>
        </div>
        
        <button id="retireBtn">RETIRE KÒB</button>
        <div class="play-btn" id="playBtn">PLAY (1 GOUD)</div>
    </div>
</div>

<script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const gameArea = document.getElementById("gameArea");
    let accumulatedBalance = 0.00;

    // Trase Pwen yo
    function drawPegs() {
        for(let i=0; i<6; i++) {
            for(let j=0; j<=i; j++) {
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(175 - (i*14) + (j*28), (i*30), 3, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }
    drawPegs();

    document.getElementById("playBtn").addEventListener("click", () => {
        let confirmPlay = confirm("Èske ou vle peye 1 goud pou w jwe?");
        if (confirmPlay) {
            startBall();
        }
    });

    function startBall() {
        const ball = document.createElement("div");
        ball.className = "ball";
        ball.style.left = "175px";
        ball.style.top = "150px";
        gameArea.appendChild(ball);

        let y = 150;
        let x = 175;
        
        let move = setInterval(() => {
            y += 5;
            x += (Math.random() - 0.5) * 10;
            ball.style.top = y + "px";
            ball.style.left = x + "px";

            if(y > 330) {
                clearInterval(move);
                ball.remove();
                let outcomes = [0, 0.25, 0.50, 25.00, 0.50, 0.25, 0];
                let won = outcomes[Math.floor(Math.random() * outcomes.length)];
                accumulatedBalance += won;
            }
        }, 30);
    }

    document.getElementById("retireBtn").addEventListener("click", () => {
        alert("Ou retire yon total de: " + accumulatedBalance.toFixed(2) + " HTG!");
        accumulatedBalance = 0;
    });
</script>
</body>
</html>
