<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAITI PLINKO PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop') center/cover;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(5px);
}

.game{
position:relative;
z-index:2;
width:100%;
max-width:430px;
padding:15px;
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.videoBox{
width:100%;
height:160px;
border-radius:20px;
overflow:hidden;
border:3px solid #6ff;
box-shadow:0 0 20px #0ff;
position:relative;
background:#111;
}

.videoBox img{
width:100%;
height:100%;
object-fit:cover;
}

.videoText{
position:absolute;
bottom:10px;
left:0;
right:0;
text-align:center;
font-size:18px;
font-weight:bold;
color:yellow;
text-shadow:0 0 10px #000;
}

.balance{
width:250px;
height:70px;
border-radius:20px;
background:#111827;
border:4px solid #5ff;
display:flex;
justify-content:center;
align-items:center;
font-size:48px;
font-weight:bold;
color:white;
box-shadow:0 0 20px #0ff;
}

.boardWrap{
position:relative;
width:100%;
display:flex;
justify-content:center;
}

canvas{
background:rgba(25,0,70,.85);
border-radius:40px;
box-shadow:
0 0 25px #00f0ff,
inset 0 0 20px #0ff;
}

.flag{
position:absolute;
top:130px;
width:80px;
height:80px;
border-radius:50%;
overflow:hidden;
border:3px solid #00f0ff;
box-shadow:0 0 20px #00f0ff;
}

.flag img{
width:100%;
height:100%;
object-fit:cover;
}

.leftFlag{
left:-5px;
}

.rightFlag{
right:-5px;
}

.controls{
width:100%;
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

button{
width:270px;
height:75px;
border:none;
border-radius:20px;
font-size:38px;
font-weight:bold;
cursor:pointer;
transition:.2s;
color:white;
}

button:active{
transform:scale(.95);
}

.withdraw{
background:#12005e;
box-shadow:0 0 20px #4d7cff;
}

.play{
background:linear-gradient(180deg,#00ff4c,#008d00);
box-shadow:0 0 25px #00ff40;
}

@media(max-width:450px){

.videoBox{
height:140px;
}

.balance{
width:220px;
font-size:40px;
}

button{
width:240px;
height:70px;
font-size:34px;
}

}

</style>
</head>
<body>

<div class="overlay"></div>

<div class="game">

<div class="videoBox">
<img src="https://i.imgur.com/6RL6R3Y.jpeg">
<div class="videoText">UNIQUEMENT POUR HAÏTI</div>
</div>

<div class="balance" id="money">0 HTG</div>

<div class="boardWrap">

<div class="flag leftFlag">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Flag_of_Haiti.svg">
</div>

<canvas id="board" width="400" height="500"></canvas>

<div class="flag rightFlag">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Flag_of_Haiti.svg">
</div>

</div>

<div class="controls">

<button class="withdraw">
RETIRER
</button>

<button class="play" id="playBtn">
JOUER
</button>

</div>

</div>

<script>

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const moneyText = document.getElementById("money");
const playBtn = document.getElementById("playBtn");

let balance = 0;

const pegs = [];
const rows = 10;

const slots = [
5,5,8,20,100,3,500,3,100,20,8,5,5
];

const colors = [
"#ff2d55",
"#ff2d55",
"#ff9800",
"#ffd600",
"#ff00ff",
"#ff2d55",
"#00cfff",
"#ff2d55",
"#ff00ff",
"#ffd600",
"#ff9800",
"#ff2d55",
"#ff2d55"
];

for(let row=0; row<rows; row++){

let cols = row + 1;

for(let col=0; col<cols; col++){

let x = canvas.width/2 - row*18 + col*36;
let y = 50 + row*40;

pegs.push({x,y});

}

}

let balls = [];

function drawBoard(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.beginPath();
ctx.moveTo(20,450);
ctx.lineTo(200,20);
ctx.lineTo(380,450);
ctx.closePath();

ctx.fillStyle = "rgba(40,0,90,.95)";
ctx.fill();

ctx.strokeStyle = "#00f0ff";
ctx.lineWidth = 5;
ctx.shadowBlur = 20;
ctx.shadowColor = "#00f0ff";
ctx.stroke();

for(let peg of pegs){

ctx.beginPath();
ctx.arc(peg.x,peg.y,5,0,Math.PI*2);
ctx.fillStyle = "white";
ctx.fill();

}

const slotWidth = 28;

for(let i=0;i<slots.length;i++){

let x = 18 + i*29;
let y = 420;

ctx.fillStyle = colors[i];

roundRect(x,y,26,26,8,true);

ctx.fillStyle = "white";
ctx.font = "bold 12px Arial";
ctx.textAlign = "center";
ctx.fillText("x"+slots[i],x+13,y+17);

}

}

function roundRect(x,y,w,h,r,fill){

ctx.beginPath();
ctx.moveTo(x+r,y);
ctx.lineTo(x+w-r,y);
ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);
ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
ctx.lineTo(x+r,y+h);
ctx.quadraticCurveTo(x,y+h,x,y+h-r);
ctx.lineTo(x,y+r);
ctx.quadraticCurveTo(x,y,x+r,y);
ctx.closePath();

if(fill) ctx.fill();

}

class Ball{

constructor(){

this.x = 200;
this.y = 30;
this.radius = 7;

this.vx = (Math.random()-.5)*2;
this.vy = 2;

this.active = true;

}

update(){

this.vy += 0.08;
this.y += this.vy;
this.x += this.vx;

for(let peg of pegs){

let dx = this.x - peg.x;
let dy = this.y - peg.y;

let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < this.radius + 5){

this.vx += dx * 0.05;
this.vy *= -0.2;

}

}

if(this.y > 415){

this.active = false;

let index = Math.floor(this.x / 30);

if(index < 0) index = 0;
if(index > slots.length-1) index = slots.length-1;

let gain = slots[index];

balance += gain;

moneyText.innerHTML = balance + " HTG";

}

}

draw(){

ctx.beginPath();
ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

ctx.fillStyle = "yellow";
ctx.shadowBlur = 20;
ctx.shadowColor = "yellow";

ctx.fill();

}

}

function animate(){

drawBoard();

balls.forEach(ball=>{

ball.update();
ball.draw();

});

balls = balls.filter(ball=>ball.active);

requestAnimationFrame(animate);

}

animate();

playBtn.onclick = ()=>{

balls.push(new Ball());

};

</script>

</body>
</html>
